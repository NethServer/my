name: PR - Resume Preview Env on Comment

# Comment "up deploy" on a PR to resume its Render preview services after a
# "down deploy" suspend. Resume restarts the last build; to rebuild the latest
# commit, follow up with "update deploy".

on:
  issue_comment:
    types: [created]

jobs:
  resume-preview:
    if: |
      github.event.issue.pull_request &&
      github.event.comment.body == 'up deploy' &&
      contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
    name: Resume Preview Services
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      PR_NUMBER: ${{ github.event.issue.number }}
      # QA services with pullRequestPreviewsEnabled: true in render.yaml.
      # Render names each preview instance "<base>-pr-<PR_NUMBER>".
      SERVICE_BASES: "my-mimir-qa my-backend-qa my-collect-qa my-frontend-qa my-proxy-qa"

    steps:
      - name: Resume Render preview services
        id: resume
        run: |
          set -euo pipefail

          if [ -z "${RENDER_API_KEY:-}" ]; then
            echo "::error::RENDER_API_KEY secret is not set. Add it under Settings > Secrets and variables > Actions."
            exit 1
          fi

          API="https://api.render.com/v1"
          AUTH="Authorization: Bearer ${RENDER_API_KEY}"

          RESUMED=()
          NOT_FOUND=()

          for base in $SERVICE_BASES; do
            name="${base}-pr-${PR_NUMBER}"
            echo "Looking up service: $name"

            id=$(curl -s -H "$AUTH" "${API}/services?name=${name}&limit=20" \
              | jq -r --arg n "$name" 'first(.[] | select(.service.name == $n) | .service.id) // empty')

            if [ -z "$id" ] || [ "$id" = "null" ]; then
              echo "  not found — skipping"
              NOT_FOUND+=("$name")
              continue
            fi

            echo "  found $id — resuming"
            code=$(curl -s -o /dev/null -w "%{http_code}" -X POST -H "$AUTH" "${API}/services/${id}/resume")
            if [ "$code" = "200" ] || [ "$code" = "202" ]; then
              echo "  resumed (HTTP $code)"
              RESUMED+=("$name")
            else
              echo "::error::Failed to resume $name (HTTP $code)"
              exit 1
            fi
          done

          {
            echo "resumed<<EOF"
            printf '%s\n' "${RESUMED[@]:-}"
            echo "EOF"
            echo "not_found<<EOF"
            printf '%s\n' "${NOT_FOUND[@]:-}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const resumed = `${{ steps.resume.outputs.resumed }}`.split('\n').filter(Boolean);
            const notFound = `${{ steps.resume.outputs.not_found }}`.split('\n').filter(Boolean);

            const lines = ['🔌 **Preview environment resumed**', ''];
            if (resumed.length) {
              lines.push('Back online (last build restored):');
              resumed.forEach(s => lines.push(`- \`${s}\``));
            } else {
              lines.push('No suspended preview services were found to resume.');
            }
            if (notFound.length) {
              lines.push('', 'Skipped (not found):');
              notFound.forEach(s => lines.push(`- \`${s}\``));
            }
            lines.push(
              '',
              '> Resume restarts the last build. To rebuild the latest commit, comment `update deploy`.'
            );

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: lines.join('\n')
            });
