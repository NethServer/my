multitenancy_enabled: true
target: alertmanager

common:
  storage:
    backend: s3
    s3:
      endpoint: ${S3_ENDPOINT}
      secret_access_key: ${S3_SECRET_KEY}
      access_key_id: ${S3_ACCESS_KEY}

alertmanager_storage:
  s3:
    bucket_name: ${MIMIR_S3_ALERTMANAGER_BUCKET}

server:
  http_listen_port: ${PORT}
  log_level: info

# Global per-tenant defaults. A misbehaving tenant cannot saturate the
# container memory: alerts/silences are bounded and notifications are
# rate-limited. Per-tenant overrides go in runtime_config.yaml.
limits:
  # Sized for our largest tenants (orgs with 300-400 systems, each able to fire
  # several alerts): ~2k active alerts per tenant. A dispatcher group always
  # holds >=1 alert, so groups can never exceed the alert count — keep the two
  # aligned (both 2048, power of two, up from the 128 default that saturated and
  # made the dispatcher drop new alert groups) so neither becomes a premature
  # drop point while still bounding per-tenant memory.
  alertmanager_max_alerts_count: 2048
  alertmanager_max_alerts_size_bytes: 10485760
  alertmanager_max_silences_count: 200
  alertmanager_max_silence_size_bytes: 16384
  alertmanager_max_config_size_bytes: 1048576
  alertmanager_max_dispatcher_aggregation_groups: 2048
  alertmanager_notification_rate_limit: 50

runtime_config:
  file: /etc/mimir/runtime_config.yaml
  period: 10s