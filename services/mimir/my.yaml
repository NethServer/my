multitenancy_enabled: true
target: alertmanager

common:
  storage:
    backend: s3
    s3:
      endpoint: ${S3_ENDPOINT}
      secret_access_key: ${S3_SECRET_KEY}
      access_key_id: ${S3_ACCESS_KEY}

alertmanager_storage:
  s3:
    bucket_name: ${MIMIR_S3_ALERTMANAGER_BUCKET}

server:
  http_listen_port: ${PORT}
  log_level: info

# Global per-tenant defaults. A misbehaving tenant cannot saturate the
# container memory: alerts/silences are bounded and notifications are
# rate-limited. Per-tenant overrides go in runtime_config.yaml.
limits:
  # A tenant is now a RESELLER, aggregating all its customers (per-customer
  # routing lives inside one tenant config keyed on the organization_id label).
  # So per-tenant limits scale with the reseller's whole fleet, not a single
  # org: alerts/groups sized for a large reseller (~thousands of systems), the
  # config bounded at 4 MiB (~0.9 KiB per customer routing block → ~4k
  # customers/reseller before an override is needed), and silences at the sum of
  # its customers'. Per-reseller overrides go in runtime_config.yaml.
  alertmanager_max_alerts_count: 16384
  alertmanager_max_alerts_size_bytes: 10485760
  alertmanager_max_silences_count: 5000
  alertmanager_max_silence_size_bytes: 16384
  alertmanager_max_config_size_bytes: 4194304
  alertmanager_max_dispatcher_aggregation_groups: 16384
  alertmanager_notification_rate_limit: 50

runtime_config:
  file: /etc/mimir/runtime_config.yaml
  period: 10s