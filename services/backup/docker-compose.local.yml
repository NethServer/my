# Local development — Garage as an S3-compatible backup store.
#
# Garage runs as a single node with persistent volumes for metadata and
# data. A one-shot bootstrap container assigns the cluster layout,
# creates the bucket, and imports a pair of fixed access credentials so
# they can be pasted verbatim into backend/.env and collect/.env.
#
# Start: podman-compose -f services/backup/docker-compose.local.yml up -d
# Stop:  podman-compose -f services/backup/docker-compose.local.yml down
#
# Service URLs:
#   - Garage S3 API: http://localhost:13900
#   - Garage Admin API: http://localhost:13903 (health check only)
#
# Wire the following env vars into backend/.env and collect/.env when
# running the components on the host (go run):
#   BACKUP_S3_ENDPOINT=http://localhost:13900
#   BACKUP_S3_REGION=garage
#   BACKUP_S3_BUCKET=my-backups-dev
#   BACKUP_S3_ACCESS_KEY=backup-local-key
#   BACKUP_S3_SECRET_KEY=backup-local-secret-backup-local-secret-0000000000
#   BACKUP_S3_USE_PATH_STYLE=true
#
# When running backend/collect inside a compose network (root
# docker-compose.yml), join this file's network and set instead:
#   BACKUP_S3_ENDPOINT=http://garage:3900
#   BACKUP_S3_PRESIGN_ENDPOINT=http://localhost:13900   (backend only)

version: '3.8'

services:
  garage:
    image: docker.io/dxflrs/garage:v1.0.1
    container_name: ${COMPOSE_PROJECT_NAME:-backup-local}-garage
    restart: unless-stopped
    command: ["/garage", "-c", "/etc/garage/garage.toml", "server"]
    volumes:
      - ./garage-local.toml:/etc/garage/garage.toml:ro
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
    ports:
      - "13900:3900"
      - "13903:3903"
    networks:
      - backup-local
    healthcheck:
      test: ["CMD", "/garage", "-c", "/etc/garage/garage.toml", "status"]
      interval: 5s
      timeout: 3s
      retries: 20

  # One-shot bootstrap: assign layout, create bucket, import access key,
  # grant access. Every command is idempotent so re-runs are safe.
  garage-init:
    image: docker.io/dxflrs/garage:v1.0.1
    container_name: ${COMPOSE_PROJECT_NAME:-backup-local}-garage-init
    depends_on:
      garage:
        condition: service_healthy
    environment:
      GARAGE_RPC_HOST: garage:3901
      GARAGE_RPC_SECRET: "1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef"
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        NODE_ID=$$(/garage node id -q | cut -d'@' -f1)
        /garage layout assign -z dc1 -c 10G "$$NODE_ID" 2>/dev/null || true
        /garage layout apply --version 1 2>/dev/null || true
        /garage bucket create my-backups-dev 2>/dev/null || true
        /garage key import --yes --name backup-local \
            backup-local-key \
            backup-local-secret-backup-local-secret-0000000000 \
            2>/dev/null || true
        /garage bucket allow --read --write --owner \
            my-backups-dev --key backup-local-key 2>/dev/null || true
        echo "Garage bootstrap complete (idempotent)."
    networks:
      - backup-local

networks:
  backup-local:
    name: ${COMPOSE_PROJECT_NAME:-backup-local}-network
    driver: bridge

volumes:
  garage-meta:
    name: ${COMPOSE_PROJECT_NAME:-backup-local}-meta
  garage-data:
    name: ${COMPOSE_PROJECT_NAME:-backup-local}-data
