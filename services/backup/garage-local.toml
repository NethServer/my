metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "lmdb"

replication_factor = 1

rpc_bind_addr = "[::]:3901"
rpc_public_addr = "127.0.0.1:3901"
# Fixed development secret — acceptable because this config file only ships
# in the local compose and the RPC port is never exposed outside the
# container network. Do NOT reuse these values outside local development.
rpc_secret = "1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef"

[s3_api]
s3_region = "garage"
api_bind_addr = "[::]:3900"
root_domain = ".s3.garage.local"

[admin]
api_bind_addr = "[::]:3903"
admin_token = "local-dev-admin"
