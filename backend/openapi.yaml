      description: |
        Returns rebranding configuration for the authenticated system.
        Resolves hierarchy inheritance (customer -> reseller -> distributor).
        Response groups products by type (system vs application).
      security:
        - BasicAuth: []
      responses:
        '200':
          description: System rebranding configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/SystemRebrandingResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /systems/rebranding/{product_id}/{asset}:
    get:
      operationId: getSystemRebrandingAsset
      tags:
        - Collect - Rebranding
      summary: Get a rebranding asset binary for the system
      description: Serves asset binary with hierarchy resolution
      security:
        - BasicAuth: []
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: string
        - name: asset
          in: path
          required: true
          schema:
            type: string
            enum: [logo_light_rect, logo_dark_rect, logo_light_square, logo_dark_square, favicon, background_image]
      responses:
        '200':
          description: Asset binary
          content:
            image/*:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'

  # ===========================================
  # ALERTING ENDPOINTS (Backend - Totals & Trend)
  # ===========================================

  /alerts/totals:
    get:
      operationId: getAlertsTotals
      tags:
        - Backend - Alerts
      summary: Get alert totals
      description: |
        Returns active alert counts by severity (from Mimir) and total resolved alert history count (from DB).
        Requires `read:systems` permission.
      security:
        - BearerAuth: []
      parameters:
        - name: organization_id
          in: query
          description: Target organization ID. Required for Owner, Distributor, and Reseller roles.
          schema:
            type: string
      responses:
        '200':
          description: Alert totals retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: alert totals retrieved successfully
                  data:
                    type: object
                    properties:
                      active:
                        type: integer
                        description: Total active alerts
                      critical:
                        type: integer
                        description: Active critical alerts
                      warning:
                        type: integer
                        description: Active warning alerts
                      info:
                        type: integer
                        description: Active info alerts
                      history:
                        type: integer
                        description: Total resolved alerts in history
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /alerts/trend:
    get:
      operationId: getAlertsTrend
      tags:
        - Backend - Alerts
      summary: Get alert history trend
      description: |
        Returns trend data for resolved alerts over a specified period with daily data points.
        Compares the current period with the previous period of equal length.
        Requires `read:systems` permission.
      security:
        - BearerAuth: []
      parameters:
        - name: period
          in: query
          description: Trend period in days
          schema:
            type: integer
            enum: [7, 30, 180, 365]
            default: 7
      responses:
        '200':
          description: Alert trend data
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: alerts trend retrieved successfully
                  data:
                    type: object
                    properties:
                      period:
                        type: integer
                      period_label:
                        type: string
                      current_total:
                        type: integer
                      previous_total:
                        type: integer
                      delta:
                        type: integer
                      delta_percentage:
                        type: number
                      trend:
                        type: string
                        enum: [up, down, stable]
                      data_points:
                        type: array
                        items:
                          type: object
                          properties:
                            date:
                              type: string
                              format: date
                            count:
                              type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ===========================================
  # ALERTING ENDPOINTS (Backend - Configuration)
  # ===========================================

  /alerts/config:
    post:
      operationId: configureAlerts
      tags:
        - Backend - Alerts
      summary: Configure alert routing
      description: |
        Accepts a generic AlertingConfig JSON, renders it into a valid Alertmanager YAML configuration,
        and pushes it to Mimir. SMTP settings are injected server-side.
        A built-in history webhook (ALERTING_HISTORY_WEBHOOK_URL) is always included and cannot be disabled.
        Priority order: per-system overrides > per-severity overrides > global settings.
        Address fallback: if an override's address list is empty, global addresses are used.
      security:
        - BearerAuth: []
      parameters:
        - name: organization_id
          in: query
          description: Target organization ID. Required for Owner, Distributor, and Reseller roles. Customer role uses their own organization automatically.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertingConfig'
      responses:
        '200':
          description: Alerting configuration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: disableAlerts
      tags:
        - Backend - Alerts
      summary: Disable all alerts
      description: Replaces the Alertmanager config with a blackhole-only configuration, silencing all alerts for the organization. The built-in history webhook remains active.
      security:
        - BearerAuth: []
      parameters:
        - name: organization_id
          in: query
          description: Target organization ID. Required for Owner, Distributor, and Reseller roles.
          schema:
            type: string
      responses:
        '200':
          description: All alerts disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      operationId: getAlertingConfig
      tags:
        - Backend - Alerts
      summary: Get current alerting configuration
      description: |
        Retrieves the current alerting configuration from Mimir (source of truth).
        By default returns structured JSON (AlertingConfig). Use ?format=yaml to get the raw redacted YAML.
      security:
        - BearerAuth: []
      parameters:
        - name: organization_id
          in: query
          description: Target organization ID. Required for Owner, Distributor, and Reseller roles.
          schema:
            type: string
        - name: format
          in: query
          description: Response format. Omit for JSON (default) or set to "yaml" for raw YAML.
          schema:
            type: string
            enum: [yaml]
      responses:
        '200':
          description: Current alerting configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: alerting configuration retrieved successfully
                  data:
                    type: object
                    properties:
                      config:
                        oneOf:
                          - $ref: '#/components/schemas/AlertingConfig'
                          - type: string
                            description: Raw redacted YAML (when ?format=yaml)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /alerts:
    get:
      operationId: getAlerts
      tags:
        - Backend - Alerts
      summary: List active alerts
      description: Retrieves active alerts from Mimir for the specified organization with optional filtering by state, severity, and system_key.
      security:
        - BearerAuth: []
      parameters:
        - name: organization_id
          in: query
          description: Target organization ID. Required for Owner, Distributor, and Reseller roles.
          schema:
            type: string
        - name: state
          in: query
          description: Filter alerts by state
          schema:
            type: string
            enum: [active, suppressed, unprocessed]
        - name: severity
          in: query
          description: Filter alerts by severity label
          schema:
            type: string
            enum: [critical, warning, info]
        - name: system_key
          in: query
          description: Filter alerts by system_key label
          schema:
            type: string
      responses:
        '200':
          description: List of active alerts
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: alerts retrieved successfully
                  data:
                    type: object
                    properties:
                      alerts:
                        type: array
                        items:
                          type: object
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ===========================================
  # ALERTING ENDPOINTS (Collect - Mimir Proxy)
  # ===========================================

  /services/mimir/alertmanager/api/v2/alerts:
    get:
      operationId: mimirAlertsGet
      tags:
        - Collect - Alerting
      summary: List active alerts
      description: |
        Lists all active alerts for the authenticated system, filtered by that system's `system_key`.
        
        Each system is scoped to see only its own alerts. The proxy automatically injects a `system_key` filter into the query.
        
        **Access control:** Requires HTTP Basic Auth with valid system credentials.
      security:
        - BasicAuth: []
      responses:
        '200':
          description: List of active alerts belonging to this system
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          $ref: '#/components/responses/RequestEntityTooLarge'
        '502':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: mimirAlertsPost
      tags:
        - Collect - Alerting
      summary: Push alerts
      description: |
        Pushes one or more alerts to the Alertmanager for this system.
        
        The system's `system_key`, `system_id`, and `organization_id` are automatically injected and override any client-supplied values.
        
        **Access control:** Requires HTTP Basic Auth with valid system credentials.
        
        **Request body limits:** Maximum 10 MB per request (configurable via `API_MAX_REQUEST_SIZE`).
      security:
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
      responses:
        '200':
          description: Alerts accepted and forwarded to Alertmanager
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          $ref: '#/components/responses/RequestEntityTooLarge'
        '502':
          $ref: '#/components/responses/InternalServerError'

  /services/mimir/alertmanager/api/v2/silences:
    get:
      operationId: mimirSilencesGet
      tags:
        - Collect - Alerting
      summary: List silences
      description: |
        Lists all silences for this system's organization, filtered to silences that target this system's `system_key`.
        
        The proxy injects a `system_key` filter to ensure each system only sees its own silences.
        
        **Access control:** Requires HTTP Basic Auth with valid system credentials.
      security:
        - BasicAuth: []
      responses:
        '200':
          description: List of silences belonging to this system
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          $ref: '#/components/responses/RequestEntityTooLarge'
        '502':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: mimirSilencesPost
      tags:
        - Collect - Alerting
      summary: Create or update a silence
      description: |
        Creates or updates a silence that targets this system's alerts.
        
        The proxy automatically injects a `system_key` matcher for this system into the silence, overwriting any client-supplied `system_key` matcher. This ensures silences can only target this system's alerts.
        
        **Access control:** Requires HTTP Basic Auth with valid system credentials.
        
        **Silence matchers:** The silence must include at least one matcher (e.g., `alertname`). The `system_key` matcher is added automatically and cannot be customized.
      security:
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Silence object with matchers, startsAt, endsAt, createdBy, comment
      responses:
        '200':
          description: Silence created or updated successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          $ref: '#/components/responses/RequestEntityTooLarge'
        '502':
          $ref: '#/components/responses/InternalServerError'

  /services/mimir/alertmanager/api/v2/silences/{silence_id}:
    parameters:
      - name: silence_id
        in: path
        required: true
        schema:
          type: string
        description: Silence UUID
    get:
      operationId: mimirSilenceGet
      tags:
        - Collect - Alerting
      summary: Get a silence
      description: |
        Returns a specific silence by ID, if it belongs to this system.
        
        Before forwarding the request to Alertmanager, the proxy verifies the silence contains an exact `system_key` matcher matching this system. If the silence does not belong to this system, a 403 Forbidden response is returned.
        
        **Access control:** Requires HTTP Basic Auth with valid system credentials.
      security:
        - BasicAuth: []
      responses:
        '200':
          description: Silence details (only if it targets this system)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '413':
          $ref: '#/components/responses/RequestEntityTooLarge'
        '502':
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: mimirSilenceDelete
      tags:
        - Collect - Alerting
      summary: Delete a silence
      description: |
        Deletes a silence by ID, if it belongs to this system.
        
        Before forwarding the request to Alertmanager, the proxy verifies the silence contains an exact `system_key` matcher matching this system. If the silence does not belong to this system, a 403 Forbidden response is returned.
        
        **Access control:** Requires HTTP Basic Auth with valid system credentials.
      security:
        - BasicAuth: []
      responses:
        '200':
          description: Silence deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '413':
          $ref: '#/components/responses/RequestEntityTooLarge'
        '502':
          $ref: '#/components/responses/InternalServerError'

  # ===========================================
  # ALERTING ENDPOINTS (Collect - Alert History Webhook)
  # ===========================================

  /alert_history:
    post:
      operationId: receiveAlertHistory
      tags:
        - Collect - Alerting
      summary: Receive alert history webhook
      description: |
        Receives resolved alert webhooks from Alertmanager and persists them to the alert_history table.
        Firing alerts are ignored; only resolved alerts are stored.
        Authenticated via Bearer token (ALERTING_HISTORY_WEBHOOK_SECRET).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  example: "resolved"
                alerts:
                  type: array
                  items:
                    type: object
                receiver:
                  type: string
      responses:
        '204':
          description: Webhook processed successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          description: Webhook authentication not configured
