        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                product_name:
                  type: string
                  maxLength: 100
                logo_light_rect:
                  type: string
                  format: binary
                logo_dark_rect:
                  type: string
                  format: binary
                logo_light_square:
                  type: string
                  format: binary
                logo_dark_square:
                  type: string
                  format: binary
                favicon:
                  type: string
                  format: binary
                background_image:
                  type: string
                  format: binary
