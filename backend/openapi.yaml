      parameters:
        - name: session_id
          in: path
          description: Impersonation session ID
          required: true
          schema:
            type: string
          example: "sess_abc123def456"
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Session audit logs retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "session audit retrieved successfully"
                  data:
                    type: object
                    properties:
                      session_id:
                        type: string
                        description: Session ID
                        example: "sess_abc123def456"
                      entries:
                        type: array
                        items:
                          $ref: '#/components/schemas/ImpersonationAuditEntry'
                      pagination:
                        $ref: '#/components/schemas/Pagination'
        '400':
          description: Missing or invalid session_id parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 400
                message: "session_id parameter is required"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Session not found or access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 404
                message: "session not found or access denied"
        '500':
          $ref: '#/components/responses/InternalServerError'

