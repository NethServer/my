          schema:
            type: string
          description: Logto organization ID (logto_id, not the database UUID)
        - name: product_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product rebranding deleted
        '403':
          $ref: '#/components/responses/Forbidden'

