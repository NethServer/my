events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Sanitize token query param from logs
    map $request_uri $sanitized_request_uri {
        "~^(?<prefix>[^?]*\?)(?<before>.*)token=[^&]*(?<after>.*)$" "$prefix${before}token=[REDACTED]$after";
        default $request_uri;
    }

    log_format main '$remote_addr [$time_local] "$request_method $sanitized_request_uri $server_protocol" '
                    '$status $body_bytes_sent "$http_referer"';

    access_log /dev/stdout main;
    error_log /dev/stderr warn;

    # SSL certificates (mkcert)
    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # Support subdomain proxy — *.support.my.localtest.me
    server {
        listen 443 ssl;
        server_name ~^.+\.support\..*;

        location / {
            rewrite ^(.*)$ /support-proxy$1 break;

            proxy_pass http://host.containers.internal:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Long timeouts for support sessions
            proxy_connect_timeout 24h;
            proxy_send_timeout 24h;
            proxy_read_timeout 24h;
        }
    }

    # Main app — my.localtest.me
    server {
        listen 443 ssl default_server;
        server_name _;

        # Backend API
        location /api/ {
            proxy_pass http://host.containers.internal:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;

            # WebSocket support (terminal, etc.)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Long timeouts for WebSocket terminal sessions
            proxy_connect_timeout 30s;
            proxy_send_timeout 24h;
            proxy_read_timeout 24h;
        }

        # Frontend (Vite dev server)
        location / {
            proxy_pass http://host.containers.internal:5173;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;

            # WebSocket support (Vite HMR)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
