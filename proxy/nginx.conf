events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Sanitize token query param from logs
    map $request_uri $sanitized_request_uri {
        "~^(?<prefix>[^?]*\?)(?<before>.*)token=[^&]*(?<after>.*)$" "$prefix${before}token=[REDACTED]$after";
        default $request_uri;
    }

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request_method $sanitized_request_uri $server_protocol" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # DNS resolver for dynamic upstream resolution (internal Render DNS)
    resolver ${RESOLVER} valid=30s;
    resolver_timeout 5s;

    # Support subdomain proxy — *.support.{domain}
    server {
        listen ${PORT};
        server_name ~^.+\.support\..*;

        location / {
            set $backend_upstream http://${BACKEND_SERVICE_NAME}:10000;
            rewrite ^(.*)$ /support-proxy$1 break;

            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Long timeouts for support sessions
            proxy_connect_timeout 24h;
            proxy_send_timeout 24h;
            proxy_read_timeout 24h;
        }
    }

    server {
        listen ${PORT} default_server;
        server_name _;

        # Health check endpoint for this proxy
        location /health {
            access_log off;
            return 200 "nginx proxy healthy\n";
            add_header Content-Type text/plain;
        }

        # Collect service routes - redirect without trailing slash
        location = /collect/api {
            return 301 /collect/api/;
        }

        location /collect/api/ {
            set $collect_upstream http://${COLLECT_SERVICE_NAME}:10000;
            rewrite ^/collect/api/(.*)$ /api/$1 break;
            proxy_pass $collect_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Backend service routes - redirect without trailing slash
        location = /backend/api {
            return 301 /backend/api/;
        }

        location /backend/api/ {
            set $backend_upstream http://${BACKEND_SERVICE_NAME}:10000;
            rewrite ^/backend/api/(.*)$ /api/$1 break;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # WebSocket support (terminal sessions)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Long timeouts for WebSocket terminal sessions
            proxy_connect_timeout 30s;
            proxy_send_timeout 24h;
            proxy_read_timeout 24h;
        }

        # Support service routes — only the tunnel endpoint is exposed (requires Basic Auth).
        # All other support service endpoints (terminal, proxy, health) are internal-only
        # and accessed by the backend via private networking.
        location = /support/api/tunnel {
            set $support_upstream http://${SUPPORT_SERVICE_NAME}:10000;
            rewrite ^/support/api/(.*)$ /api/$1 break;
            proxy_pass $support_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Long timeouts for tunnel connections
            proxy_connect_timeout 24h;
            proxy_send_timeout 24h;
            proxy_read_timeout 24h;
        }

        # Block all other support service endpoints
        location /support/api/ {
            return 403;
        }

        # Frontend routes - everything else
        location / {
            set $frontend_upstream http://${FRONTEND_SERVICE_NAME}:10000;
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
    }
}
