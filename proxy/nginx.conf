events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Sanitize token query param from logs
    map $request_uri $sanitized_request_uri {
        "~^(?<prefix>[^?]*\?)(?<before>.*)token=[^&]*(?<after>.*)$" "$prefix${before}token=[REDACTED]$after";
        default $request_uri;
    }

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request_method $sanitized_request_uri $server_protocol" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # TLS terminates at Render's edge, so this header is always sent over
    # HTTPS even though nginx itself listens on plain HTTP. No
    # includeSubDomains: legacy.my.nethesis.it and other siblings are not
    # ours to commit.
    add_header Strict-Transport-Security "max-age=31536000" always;
    # CSP is the main XSS mitigation: Logto tokens live in browser storage,
    # so blocking foreign script execution is what protects them.
    # ${LOGTO_ENDPOINT} is needed in connect-src for the @logto/browser
    # OIDC fetches (config/token/userinfo) and in img-src for
    # Logto-hosted avatars; 'unsafe-inline' styles are required by the
    # index.html loader and runtime-injected component styles.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: ${LOGTO_ENDPOINT}; font-src 'self' data:; connect-src 'self' ${LOGTO_ENDPOINT}; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'self' ${LOGTO_ENDPOINT}" always;

    # DNS resolver for dynamic upstream resolution (internal Render DNS)
    resolver ${RESOLVER} valid=30s;
    resolver_timeout 5s;

    # Support subdomain proxy — *.support.{domain}
    server {
        listen ${PORT};
        server_name ~^.+\.support\..*;

        location / {
            set $backend_upstream http://${BACKEND_SERVICE_NAME}:10000;
            rewrite ^(.*)$ /support-proxy$1 break;

            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Long timeouts for support sessions
            proxy_connect_timeout 24h;
            proxy_send_timeout 24h;
            proxy_read_timeout 24h;
        }
    }

    server {
        listen ${PORT};
        server_name _;

        # Health check endpoint for this proxy
        location /health {
            access_log off;
            return 200 "nginx proxy healthy\n";
            add_header Content-Type text/plain;
        }

        # Collect service routes - redirect without trailing slash
        location = /collect/api {
            return 301 /collect/api/;
        }

        location /collect/api/ {
            set $collect_upstream http://${COLLECT_SERVICE_NAME}:10000;
            rewrite ^/collect/api/(.*)$ /api/$1 break;
            proxy_pass $collect_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Backup upload / download on collect. POST /api/systems/backups
        # receives a GPG blob up to 2 GB from appliances on slow uplinks;
        # GET /api/systems/backups/:id streams the blob back out for
        # restore. The defaults from the parent /collect/api/ (1 MB body
        # cap, 30 s read timeout) would 413 and 504 both flows, so we
        # match this sub-path first (^~) and override the relevant
        # directives. request_buffering off keeps nginx's memory
        # footprint flat while the body streams through to collect.
        location ^~ /collect/api/systems/backups {
            set $collect_upstream http://${COLLECT_SERVICE_NAME}:10000;
            rewrite ^/collect/api/(.*)$ /api/$1 break;
            proxy_pass $collect_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            client_max_body_size 2g;
            client_body_timeout 600s;
            proxy_request_buffering off;
            proxy_connect_timeout 30s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }

        # Backend service routes - redirect without trailing slash
        location = /backend/api {
            return 301 /backend/api/;
        }

        # CSV bulk-import confirm creates one organization per row in Logto
        # (self-throttled by 429 backoff), so a few hundred rows take tens of
        # seconds and would 504 against the default 30s below. This regex wins
        # over the /backend/api/ prefix and gives just these endpoints a longer
        # read timeout; everything else keeps 30s. The backend matches this with
        # a per-route write-deadline extension (middleware.ExtendDeadline).
        location ~ ^/backend/api/[^/]+/import/confirm$ {
            set $backend_upstream http://${BACKEND_SERVICE_NAME}:10000;
            rewrite ^/backend/api/(.*)$ /api/$1 break;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            proxy_connect_timeout 30s;
            proxy_send_timeout 180s;
            proxy_read_timeout 180s;
        }

        location /backend/api/ {
            set $backend_upstream http://${BACKEND_SERVICE_NAME}:10000;
            rewrite ^/backend/api/(.*)$ /api/$1 break;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # WebSocket support (terminal sessions)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Long timeouts for WebSocket terminal sessions
            proxy_connect_timeout 30s;
            proxy_send_timeout 24h;
            proxy_read_timeout 24h;
        }

        # Support service routes — only the tunnel endpoint is exposed (requires Basic Auth).
        # All other support service endpoints (terminal, proxy, health) are internal-only
        # and accessed by the backend via private networking.
        location = /support/api/tunnel {
            set $support_upstream http://${SUPPORT_SERVICE_NAME}:10000;
            rewrite ^/support/api/(.*)$ /api/$1 break;
            proxy_pass $support_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Long timeouts for tunnel connections
            proxy_connect_timeout 24h;
            proxy_send_timeout 24h;
            proxy_read_timeout 24h;
        }

        # Block all other support service endpoints
        location /support/api/ {
            return 403;
        }

        # ===================================================================
        # Legacy old-my forwarding.
        #
        # Active only once my.nethesis.it CNAMEs to this proxy at the DNS
        # flip. Pre-flip this vhost is reached only via its onrender URL,
        # which never carries these paths, so the blocks are inert until then.
        #
        # Catches downstream appliances still on pre-cutover firmware that
        # hardcode my.nethesis.it, plus the cutover firmware's one-shot
        # credential rotation, and forwards them to the old my now living at
        # legacy.my.nethesis.it (same my-ent box, new DNS name):
        #   /isa/*    legacy heartbeat / inventory / alerts store (noc-isa)
        #   /api/*    legacy machine API (machine/info, systems/info,
        #             Utils/freekey) + public naas-* endpoints
        #   /proxy/*  translation proxy: dual-send shadow uploads and the
        #             /proxy/credentials rotation one-shot
        #   /auth     basic-auth check (nethserver_basic_auth.php) — used by
        #             backupd.nethesis.it's Traefik forwardAuth to validate
        #             legacy enterprise backups. Not IP-restricted, so it works
        #             through this hop, and the new my uses /backend/api/auth/*
        #             (not bare /auth), so this path is free. Keeping it here
        #             means backupd needs no change across the flip.
        #
        # NOT forwarded — the IP-restricted internal tools on old my
        # (contracts_counter.php, services_api.php, /api/welcome/users,
        # /api/contratti) and the old UI itself. Forwarding them would
        # fail anyway: old-my's nginx allow/deny matches the peer IP, which
        # through this hop is this proxy's egress, not the original client.
        # Internal callers/admins must hit legacy.my.nethesis.it directly.
        #
        # proxy_pass uses a variable so nginx re-resolves legacy.my.nethesis.it
        # via the `resolver` directive on each request, and does not need to
        # resolve it at startup — shipping this before legacy.my exists is safe.
        # ===================================================================
        location /isa/ {
            set $legacy_my legacy.my.nethesis.it;
            proxy_pass https://$legacy_my;
            proxy_set_header Host $legacy_my;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_ssl_server_name on;
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /api/ {
            set $legacy_my legacy.my.nethesis.it;
            proxy_pass https://$legacy_my;
            proxy_set_header Host $legacy_my;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_ssl_server_name on;
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # /proxy/backup streams GPG blobs up to 2 GB on slow uplinks — mirror
        # the relaxed body/timeout settings the translation proxy itself uses.
        location /proxy/ {
            set $legacy_my legacy.my.nethesis.it;
            proxy_pass https://$legacy_my;
            proxy_set_header Host $legacy_my;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_ssl_server_name on;
            client_max_body_size 2g;
            client_body_timeout 600s;
            proxy_request_buffering off;
            proxy_connect_timeout 30s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }

        # Basic-auth check for backupd.nethesis.it's Traefik forwardAuth (small
        # request, no body) — same legacy target as the paths above. New my auth
        # lives under /backend/api/auth/*, so the bare /auth path is free here.
        location /auth {
            set $legacy_my legacy.my.nethesis.it;
            proxy_pass https://$legacy_my;
            proxy_set_header Host $legacy_my;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_ssl_server_name on;
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Frontend routes - everything else
        location / {
            set $frontend_upstream http://${FRONTEND_SERVICE_NAME}:10000;
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
    }
}